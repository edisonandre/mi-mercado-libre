<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Admin Dashboard</title>\n    <link rel="stylesheet" href="styles.css">\n</head>\n<body>\n    <header>\n        <h1>Admin Dashboard</h1>\n    </header>\n    <main>\n        <section id="product-management">\n            <h2>Product Management</h2>\n            <div class="product-list">\n                <!-- Product items will be dynamically generated here -->\n            </div>\n            <button id="add-product">Add Product</button>\n        </section>\n        <section id="user-management">\n            <h2>User Management</h2>\n            <div class="user-list">\n                <!-- User items will be dynamically generated here -->\n            </div>\n            <button id="add-user">Add User</button>\n        </section>\n        <section id="order-management">\n            <h2>Order Management</h2>\n            <div class="order-list">\n                <!-- Order items will be dynamically generated here -->\n            </div>\n            <button id="add-order">Add Order</button>\n        </section>\n    </main>\n    <footer>\n        <p>Admin Dashboard © 2026</p>\n    </footer>\n    <script src="script.js"></script>\n</body>\n</html>
